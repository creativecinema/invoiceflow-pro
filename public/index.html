<body>
<div id="root"></div>
<div class="ver">InvoiceFlow Pro v1.0 · React 18</div>
<script>
// ─── React globals ─────────────────────────────────
const {useState,useEffect,useCallback,useRef,createContext,useContext} = React;

// ─── API Helper ────────────────────────────────────
async function api(method, path, body, isForm) {
  const opts = { method, credentials: 'include', headers: {} };
  if (body && !isForm) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  else if (isForm) opts.body = body;
  const r = await fetch('/api' + path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error || r.statusText); }
  return r.json();
}
const get = p => api('GET', p);
const post = (p, b) => api('POST', p, b);
const put = (p, b) => api('PUT', p, b);
const del = p => api('DELETE', p);

// ─── Helpers ───────────────────────────────────────
const eur = n => parseFloat(n||0).toLocaleString('de-DE',{style:'currency',currency:'EUR'});
const today = () => { const d=new Date(); return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`; };
const addDays = (ds,n) => {
  if(!ds)return today();
  const p=ds.split('.');
  if(p.length<3)return today();
  const d=new Date(p[2],p[1]-1,p[0]);
  d.setDate(d.getDate()+n);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
};
const uid = () => Math.random().toString(36).slice(2,10);

// ─── Context ───────────────────────────────────────
const Ctx = createContext(null);

// ─── Toast ─────────────────────────────────────────
function Toasts({list}) {
  return React.createElement('div',{className:'toasts'},
    list.map(t => React.createElement('div',{key:t.id,className:`toast t${t.type||'s'}`},t.msg)));
}

// ─── Hooks ─────────────────────────────────────────
function useApi(path, deps=[]) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const load = useCallback(async () => {
    try { setLoading(true); const d = await get(path); setData(d); setError(null); }
    catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, [path, ...deps]);
  useEffect(() => { load(); }, [load]);
  return [data, loading, error, load];
}

function usePg(items, pp=25) {
  const [page, setPage] = useState(1);
  const [perPage, setPerPage] = useState(pp);
  useEffect(() => setPage(1), [items]);
  const total = items?.length||0;
  const totalPages = Math.max(1, Math.ceil(total/perPage));
  const sliced = (items||[]).slice((page-1)*perPage, page*perPage);
  return {sliced, page, setPage, perPage, setPerPage, total, totalPages};
}

// ─── Modal ─────────────────────────────────────────
function Modal({open, onClose, title, children, wide}) {
  if(!open) return null;
  return React.createElement('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    React.createElement('div',{className:`mbox${wide?' mbox-w':''}`},
      React.createElement('div',{className:'flex jb aic mb3'},
        React.createElement('div',{className:'mtitle'},title),
        React.createElement('button',{className:'btn bg sm',onClick:onClose},'✕')),
      children));
}

// ─── Pagination ────────────────────────────────────
function Pagination({total, page, setPage, perPage, setPerPage, totalPages}) {
  const from=Math.min((page-1)*perPage+1,total), to=Math.min(page*perPage,total);
  return React.createElement('div',{className:'pages'},
    React.createElement('span',{style:{fontSize:11,color:'var(--t3)'}},`${from}–${to} von `,React.createElement('b',{style:{color:'var(--t2)'}},total)),
    React.createElement('div',{className:'flex g-2 aic'},
      React.createElement('button',{className:'pb',disabled:page<=1,onClick:()=>setPage(1)},'«'),
      React.createElement('button',{className:'pb',disabled:page<=1,onClick:()=>setPage(p=>p-1)},'‹'),
      React.createElement('span',{style:{fontSize:11,color:'var(--t2)',padding:'0 7px'}},`${page}/${totalPages}`),
      React.createElement('button',{className:'pb',disabled:page>=totalPages,onClick:()=>setPage(p=>p+1)},'›'),
      React.createElement('button',{className:'pb',disabled:page>=totalPages,onClick:()=>setPage(totalPages)},'»')),
    React.createElement('select',{className:'inp',style:{width:65,padding:'3px 6px',fontSize:11},value:perPage,
      onChange:e=>{setPerPage(+e.target.value);setPage(1);}},
      [10,25,50,100].map(n=>React.createElement('option',{key:n},n))));
}

// ─── Status Badge ──────────────────────────────────
const SB_MAP={paid:'tg',open:'ta',overdue:'tr',draft:'tk',sent:'tb',cancelled:'tr',storno:'tr',
  offen:'ta',versendet:'tb',angenommen:'tg',abgelehnt:'tr',active:'tg',done:'tb',
  aktiv:'tg',inaktiv:'tk',bestellt:'tb',geliefert:'tg','in Bearbeitung':'tb',
  abgeschlossen:'tg',billed:'tg',expiring:'tr'};
const SB_LBL={paid:'Bezahlt',open:'Offen',overdue:'Überfällig',draft:'Entwurf',sent:'Gesendet',
  cancelled:'Storniert',storno:'Storno','in Bearbeitung':'In Bearb.',abgeschlossen:'Abgeschlossen',
  billed:'Abgerechnet',expiring:'Läuft ab'};
function SBadge({s}) {
  return React.createElement('span',{className:`badge ${SB_MAP[s]||'tk'}`},
    SB_LBL[s]||(s?s[0].toUpperCase()+s.slice(1):'—'));
}

// ─── Topbar ────────────────────────────────────────
function Topbar({title, actions}) {
  return React.createElement('div',{className:'topbar'},
    React.createElement('div',{style:{fontSize:14,fontWeight:700,color:'var(--t1)',letterSpacing:'-.2px'}},title),
    actions&&React.createElement('div',{className:'flex g-2'},actions));
}

// ─── Navigation ────────────────────────────────────
const NAV=[
  {sec:'Übersicht',items:[{id:'dashboard',ico:'⊞',l:'Dashboard',r:['superadmin','management','employee']}]},
  {sec:'CRM',items:[
    {id:'crm-kontakte',ico:'◎',l:'Kontakte',r:['superadmin','management','employee']},
    {id:'crm-kunden',ico:'◈',l:'Kunden',r:['superadmin','management','employee']},
    {id:'crm-lieferanten',ico:'⊚',l:'Lieferanten',r:['superadmin','management']},
    {id:'crm-chancen',ico:'◈',l:'Chancen',r:['superadmin','management']},
  ]},

// ─── PDF Generator ─────────────────────────────────
function makePDF(type, doc, cfg) {
  const E=v=>String(v||'').replace(/</g,'&lt;').replace(/&/g,'&amp;');
  const company=E(cfg.company||'Ihr Unternehmen');
  const isStorno=doc.is_storno||doc.status==='storno';
  const docTitle=type==='angebot'?'Angebot':(isStorno?'Stornorechnung':'Rechnung');
  const rows=(doc.items||[]).map((it,i)=>`<tr style="background:${i%2?'#f9fafb':'#fff'}">
    <td style="padding:5px 8px;color:#888;font-size:11px">${i+1}</td>
    <td style="padding:5px 8px;font-weight:600">${E(it.desc)}</td>
    <td style="padding:5px 8px;text-align:right">${it.qty} ${it.unit}</td>
    <td style="padding:5px 8px;text-align:right">${Math.abs(it.price||0).toLocaleString('de-DE',{minimumFractionDigits:2})} €</td>
    <td style="padding:5px 8px;text-align:right">19%</td>
    <td style="padding:5px 8px;text-align:right;font-weight:700">${Math.abs(it.total||0).toLocaleString('de-DE',{minimumFractionDigits:2})} €</td>
  </tr>`).join('');
  const n=Math.abs(doc.net||0),va=Math.abs(doc.vat_amt||0),g=Math.abs(doc.gross||0);
  const fmt=v=>v.toLocaleString('de-DE',{minimumFractionDigits:2})+' €';
  const payDays=parseInt(cfg.payment_days)||14;
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${docTitle} ${E(doc.nr)}</title>
  <style>body{font-family:Arial,sans-serif;font-size:12px;color:#333;margin:0}.page{width:210mm;padding:20mm;min-height:297mm;box-sizing:border-box}
  table{width:100%;border-collapse:collapse}thead tr{background:#1a1a2e;color:#fff}thead th{padding:6px 8px;text-align:right;font-size:10px}thead th:nth-child(2){text-align:left}
  .tr{display:flex;justify-content:space-between;padding:5px 9px;font-size:11px;border-bottom:1px solid #eee}.tf{background:#1a1a2e;color:#fff;font-weight:700;font-size:13px}
  .footer{position:fixed;bottom:12mm;left:20mm;right:20mm;border-top:1px solid #e2e8f0;padding-top:3mm;font-size:9px;color:#888;display:flex;justify-content:space-between}
  @media print{.np{display:none}}</style></head>
  <body>
  <div class="np" style="position:fixed;top:10px;right:10px;display:flex;gap:8px">
    <button onclick="window.print()" style="padding:8px 18px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;cursor:pointer">⬇ Als PDF speichern</button>
    <button onclick="window.close()" style="padding:8px 14px;background:#eee;border:none;border-radius:6px;cursor:pointer">✕</button>
  </div>
  <div class="page">
    ${isStorno?`<div style="background:#e53e3e;color:#fff;text-align:center;padding:7px;border-radius:4px;font-weight:700;margin-bottom:5mm">STORNORECHNUNG · Storniert: ${E(doc.storno_ref)}</div>`:''}
    <div style="display:flex;justify-content:space-between;margin-bottom:8mm">
      <div><div style="font-size:20px;font-weight:700;color:#1a1a2e">${company}</div>
        <div style="font-size:9px;color:#888;margin-top:3px;line-height:1.6">${E(cfg.company_address)}${cfg.company_email?'<br>'+E(cfg.company_email):''}${cfg.iban?'<br>IBAN: '+E(cfg.iban)+(cfg.bic?' · BIC: '+E(cfg.bic):''):''}${cfg.tax_nr?'<br>St.-Nr.: '+E(cfg.tax_nr):''}${cfg.uid_nr?'<br>USt-IdNr.: '+E(cfg.uid_nr):''}</div></div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:700;color:${type==='angebot'?'#2b6cb0':'#1a1a2e'}">${docTitle}</div>
        <div style="color:#666;font-size:11px">${E(doc.nr)}</div>
      </div>
    </div>
    <div style="border:1px solid #e2e8f0;padding:3mm 4mm;margin-bottom:5mm;min-height:22mm">
      <div style="font-size:9px;color:#888;text-transform:uppercase;margin-bottom:2mm">Empfänger</div>
      <div style="white-space:pre-line;font-size:11px">${E(doc.customer)}</div>
    </div>
    <div style="display:flex;gap:5mm;background:#f8f9fa;padding:3mm 4mm;border-radius:4px;margin-bottom:5mm;font-size:11px">
      <div><div style="font-size:9px;color:#666">${type==='angebot'?'Angebotsdatum':'Rechnungsdatum'}</div><div style="font-weight:600">${doc.date}</div></div>
      ${type==='angebot'?`<div><div style="font-size:9px;color:#666">Gültig bis</div><div style="font-weight:600">${doc.valid}</div></div>`:
      `<div><div style="font-size:9px;color:#666">Leistungsdatum</div><div style="font-weight:600">${doc.service_date||doc.date}</div></div>
       <div><div style="font-size:9px;color:#666">Zahlungsziel</div><div style="font-weight:600">${addDays(doc.date,payDays)}</div></div>`}
      <div><div style="font-size:9px;color:#666">Dok.-Nr.</div><div style="font-weight:600">${E(doc.nr)}</div></div>
      ${cfg.tax_nr?`<div><div style="font-size:9px;color:#666">St.-Nr.</div><div style="font-weight:600">${E(cfg.tax_nr)}</div></div>`:''}
    </div>
    <table><thead><tr><th style="text-align:left;width:25px">Pos.</th><th style="text-align:left">Bezeichnung</th><th>Menge</th><th>EP netto</th><th>Steuer</th><th>GP netto</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div style="margin-top:5mm;float:right;width:230px">
      <div class="tr"><span>Nettobetrag</span><span>${fmt(n)}</span></div>
      <div class="tr"><span>zzgl. MwSt. 19%</span><span>${fmt(va)}</span></div>
      <div class="tr tf"><span>Gesamtbetrag</span><span>${fmt(g)}</span></div>
    </div>
    <div style="clear:both;margin-top:6mm;font-size:9px;color:#888;background:#f8f9fa;padding:3mm;border-radius:3px;line-height:1.6">
      ${type==='angebot'?`Dieses Angebot ist gültig bis ${doc.valid}. Alle Preise zzgl. der gesetzl. MwSt. von 19%.`:
      isStorno?`Diese Stornorechnung storniert Rechnung ${E(doc.storno_ref)} gemäß §14 UStG. Aufbewahrungspflicht 10 Jahre (§147 AO / GoBD).`:
      `Bitte überweisen Sie den Rechnungsbetrag innerhalb von ${payDays} Tagen. ${cfg.iban?'IBAN: '+E(cfg.iban)+(cfg.bic?' · BIC: '+E(cfg.bic):''):''} Diese Rechnung wurde maschinell erstellt und ist ohne Unterschrift gültig. Aufbewahrungspflicht 10 Jahre (§147 AO / GoBD).`}
    </div>
    <div class="footer"><div>${company} ${cfg.company_address?'· '+E(cfg.company_address):''}</div><div>${E(cfg.company_email||'')}</div><div>${cfg.iban?'IBAN: '+E(cfg.iban):''}</div></div>
  </div></body></html>`;
  const w=window.open('','_blank','width=900,height=700');
  if(w){w.document.write(html);w.document.close();}
  else alert('Popup blockiert! Bitte Popup-Blocker deaktivieren.');
}

function Placeholder({title,icon}) {
  const E=React.createElement;
  return E('div',null,E(Topbar,{title}),E('div',{className:'content'},E('div',{className:'empty',style:{paddingTop:70}},E('div',{style:{fontSize:44,marginBottom:14,opacity:.25}},icon||'🚧'),E('div',{style:{fontSize:13,fontWeight:700,color:'var(--t2)',marginBottom:6}},title),E('div',{style:{fontSize:11,color:'var(--t3)'}},'Wird implementiert.'))));
}

// ─── Error Boundary ────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {err:null}; }
  static getDerivedStateFromError(e) { return {err:e}; }
  componentDidCatch(e,info) { console.error('InvoiceFlow Error:',e,info); }
  render() {
    if(this.state.err) {
      return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0d1117',flexDirection:'column',gap:16,padding:20}},
        React.createElement('div',{style:{fontSize:32}},'⚠️'),
        React.createElement('div',{style:{fontSize:16,fontWeight:700,color:'#e6edf3'}},'Fehler beim Laden'),
        React.createElement('div',{style:{fontSize:12,color:'#8b949e',maxWidth:480,textAlign:'center',lineHeight:1.6}},this.state.err.message||'Unbekannter Fehler'),
        React.createElement('button',{style:{marginTop:8,padding:'8px 20px',background:'#f0b429',color:'#000',border:'none',borderRadius:6,fontWeight:700,cursor:'pointer'},onClick:()=>window.location.reload()},'↺ Neu laden'));
    }
    return this.props.children;
  }
}

// ─── App Root ──────────────────────────────────────
function App() {
  const [user,setUser] = useState(null);
  const [view,setView] = useState('dashboard');
  const [detail,setDetail] = useState(null);
  const [toasts,setToasts] = useState([]);
  const [checked,setChecked] = useState(false);
  const [invCount,setInvCount] = useState(0);

  useEffect(()=>{
    get('/auth/check').then(r=>{if(r&&r.ok)setUser(r.user);}).catch(()=>{}).finally(()=>setChecked(true));
  },[]);

  useEffect(()=>{
    if(!user)return;
    get('/rechnungen').then(r=>setInvCount(r.filter(i=>i.status==='open'||i.status==='overdue').length)).catch(()=>{});
  },[user,view]);

  const toast=useCallback((msg,type='s')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  },[]);

  const logout=useCallback(async()=>{
    await post('/auth/logout',{}).catch(()=>{});
    setUser(null);setView('dashboard');
  },[]);

  const ctx={user,toast,logout,setView,detail,setDetail};
  const E=React.createElement;

  if(!checked) return E('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}},E('span',{className:'spin'}));
  if(!user) return E(Ctx.Provider,{value:ctx},E(Login,{onLogin:u=>{setUser(u);setView('dashboard');},showToast:toast}),E(Toasts,{list:toasts}));

  const TITLES={dashboard:'Dashboard','crm-kontakte':'CRM · Kontakte','crm-kunden':'CRM · Kunden','crm-lieferanten':'CRM · Lieferanten','crm-chancen':'CRM · Chancen','vk-angebote':'Verkauf · Angebote','vk-auftraege':'Verkauf · Aufträge',invoices:'Rechnungen / Gutschriften',artikel:'Artikelverwaltung',projekte:'Projekte',zeit:'Zeiterfassung',belege:'Belege & OCR',versicherungen:'Versicherungen',users:'Nutzerverwaltung',settings:'Einstellungen'};

  const renderView=()=>{
    switch(view){
      case 'dashboard': return E(Dashboard,null);
      case 'crm-kunden': return E(Kunden,null);
      case 'vk-angebote': return E(Angebote,null);
      case 'invoices': return E(Invoices,null);
      case 'artikel': return E(Artikel,null);
      case 'projekte': return E(Projekte,null);
      case 'zeit': return E(Zeiterfassung,null);
      case 'settings': return E(Settings,null);
      case 'users': return E(Users,null);
      default: return E(Placeholder,{title:TITLES[view]||view,icon:'🚧'});
    }
  };

  return E(Ctx.Provider,{value:ctx},
    E('div',{className:'shell'},
      E(Sidebar,{user,view,setView,invCount}),
      E('div',{className:'main'},renderView())),
    E(Toasts,{list:toasts}));
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
</html>
