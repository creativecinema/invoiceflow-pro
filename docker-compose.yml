services:
  invoiceflow:
    build: .
    container_name: invoiceflow-pro
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.invoiceflow.description=InvoiceFlow Pro Abrechnungssoftware"
      - "com.invoiceflow.version=1.0.0"
