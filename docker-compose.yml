services:

  # Frontend (Nginx)
  frontend:
    build: .
    container_name: invoiceflow-pro
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Claude OCR Proxy (Python, kein npm nötig)
  claude-proxy:
    image: python:3.12-slim
    container_name: invoiceflow-claude-proxy
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./proxy-claude.py:/app/proxy-claude.py:ro
    command: python3 proxy-claude.py
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
