version: "3.9"

services:
  invoiceflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoiceflow
    restart: unless-stopped
    ports:
      - "80:3000"
    volumes:
      - ifp-data:/app/data
      - ifp-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

volumes:
  ifp-data:
  ifp-uploads:
  portainer-data:
