services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoiceflow-pro
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ai-proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai-proxy:
    image: python:3.12-alpine
    container_name: invoiceflow-proxy
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./proxy.py:/app/proxy.py:ro
    working_dir: /app
    command: python3 proxy.py
    environment:
      - PROXY_PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: invoiceflow-net
