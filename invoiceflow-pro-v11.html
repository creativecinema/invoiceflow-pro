<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>InvoiceFlow Pro</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;
  --b1:rgba(48,54,61,.8);--b2:#30363d;
  --t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;
  --am:#f0b429;--am2:#fbbf24;--amb:rgba(240,180,41,.12);--amb2:rgba(240,180,41,.2);
  --gn:#3fb950;--gnb:rgba(63,185,80,.12);
  --rd:#f85149;--rdb:rgba(248,81,73,.12);
  --bl:#58a6ff;--blb:rgba(88,166,255,.12);
  --pu:#a371f7;--pub:rgba(163,113,247,.12);
  --r1:6px;--r2:10px;--r3:16px;
}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
/* Layout */
.shell{display:flex;min-height:100vh}
.sidebar{width:216px;background:var(--s1);border-right:1px solid var(--b1);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100}
.main{margin-left:216px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{padding:10px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;background:var(--s1);position:sticky;top:0;z-index:50;min-height:46px}
.content{padding:16px 20px;flex:1}
/* Sidebar */
.sb-logo{padding:14px 14px 10px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-logo-t{font-size:14px;font-weight:800;background:linear-gradient(90deg,#f0b429,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px}
.sb-logo-s{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:5px}
.sb-sec{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.3px;padding:7px 7px 2px;margin-top:3px}
.ni{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;cursor:pointer;color:var(--t2);font-size:12px;transition:all .1s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ni:hover{background:var(--s2);color:var(--t1)}
.ni.on{background:var(--amb);color:var(--am);font-weight:500}
.ni-ico{font-size:10px;flex-shrink:0;opacity:.7}
.ni-badge{margin-left:auto;background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;flex-shrink:0}
.sb-user{padding:9px 11px;border-top:1px solid var(--b1);flex-shrink:0}
.av{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.av-sa{background:linear-gradient(135deg,#f0b429,#d97706);color:#000}
.av-mg{background:linear-gradient(135deg,#a371f7,#7c3aed);color:#fff}
.av-em{background:linear-gradient(135deg,#58a6ff,#1d4ed8);color:#fff}
.av-ip{background:linear-gradient(135deg,#3fb950,#059669);color:#fff}
.role-pill{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:10px;margin-top:3px;display:inline-block}
.rp-sa{background:var(--amb2);color:var(--am)}.rp-mg{background:var(--pub);color:var(--pu)}
.rp-em{background:var(--blb);color:var(--bl)}.rp-ip{background:var(--gnb);color:var(--gn)}
.logout-btn{display:block;width:100%;padding:5px;background:rgba(248,81,73,.07);border:1px solid rgba(248,81,73,.15);border-radius:6px;color:var(--rd);font-size:11px;cursor:pointer;margin-top:5px;text-align:center;transition:background .1s}
.logout-btn:hover{background:rgba(248,81,73,.15)}
/* Cards */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r3);padding:15px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r3);padding:13px 15px}
.kpi-l{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.kpi-v{font-size:19px;font-weight:700;color:var(--t1);line-height:1.1}
.kpi-s{font-size:10px;color:var(--t3);margin-top:3px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .12s;white-space:nowrap;line-height:1}
.bp{background:linear-gradient(135deg,#f0b429,#d97706);color:#000;font-weight:700;border:none}.bp:hover{opacity:.88}
.bg{background:rgba(255,255,255,.04);color:var(--t2);border-color:var(--b1)}.bg:hover{background:var(--s2);color:var(--t1)}
.bd{background:var(--rdb);color:var(--rd);border-color:rgba(248,81,73,.2)}.bd:hover{background:rgba(248,81,73,.2)}
.bs{background:var(--gnb);color:var(--gn);border-color:rgba(63,185,80,.2)}.bs:hover{background:rgba(63,185,80,.2)}
.bc{background:rgba(0,80,164,.12);color:#58a6ff;border-color:rgba(0,80,164,.25)}.bc:hover{background:rgba(0,80,164,.22)}
.sm{padding:4px 9px;font-size:11px;border-radius:5px}
/* Input */
.inp{display:block;width:100%;padding:7px 9px;background:var(--s2);border:1px solid var(--b2);border-radius:6px;color:var(--t1);font-size:12px;outline:none;transition:border .12s}
.inp:focus{border-color:rgba(240,180,41,.5);box-shadow:0 0 0 3px rgba(240,180,41,.07)}
.inp::placeholder{color:var(--t3)}
select.inp{appearance:none;cursor:pointer}
.lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;display:block}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.tg{background:var(--gnb);color:var(--gn)}.tr{background:var(--rdb);color:var(--rd)}
.tb{background:var(--blb);color:var(--bl)}.ta{background:var(--amb);color:var(--am)}
.tk{background:var(--s2);color:var(--t2);border:1px solid var(--b2)}.tp{background:var(--pub);color:var(--pu)}
/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:7px 9px;border-bottom:1px solid var(--b1);white-space:nowrap}
.tbl td{padding:8px 9px;border-bottom:1px solid rgba(48,54,61,.4);font-size:12px;color:var(--t2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .08s}.tbl tbody tr:hover td{background:rgba(255,255,255,.02)}
.tbl td.mono{font-family:monospace;font-size:11px;color:var(--am)}
.tbl td.strong{font-weight:600;color:var(--t1)}.tbl td.r{text-align:right}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r3);padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.mbox-w{max-width:680px}
.mtitle{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:14px}
/* Toast */
.toasts{position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{padding:9px 13px;border-radius:7px;font-size:12px;font-weight:500;animation:tst .2s ease;pointer-events:none}
.ts{background:var(--gnb);border:1px solid rgba(63,185,80,.3);color:var(--gn)}
.te{background:var(--rdb);border:1px solid rgba(248,81,73,.3);color:var(--rd)}
.ti{background:var(--blb);border:1px solid rgba(88,166,255,.3);color:var(--bl)}
.tw{background:var(--amb);border:1px solid rgba(240,180,41,.3);color:var(--am)}
@keyframes tst{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Grid / Layout helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px}
.g23{display:grid;grid-template-columns:1fr 290px;gap:16px;align-items:start}
/* Detail */
.det-tabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:16px;overflow-x:auto}
.dtab{padding:8px 15px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .1s}
.dtab:hover{color:var(--t1)}.dtab.on{color:var(--am);border-bottom-color:var(--am);font-weight:600}
.dsec{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r3);padding:14px;margin-bottom:13px}
.dsec-t{font-size:10px;font-weight:700;color:var(--t1);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--b1)}
.dfield{background:var(--s2);border:1px solid var(--b1);border-radius:5px;padding:6px 9px;font-size:12px;color:var(--t1);min-height:29px}
/* Sidebar card */
.sbc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:11px 13px;margin-bottom:9px}
.sbc-t{font-size:10px;font-weight:700;color:var(--t1);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--b1)}
.skv{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;color:var(--t2);border-bottom:1px solid rgba(48,54,61,.25)}
.skv:last-child{border-bottom:none}.skv-v{font-weight:600;color:var(--t1)}
.skv-hl{background:var(--amb);margin:-1px -4px;padding:5px 4px;border-radius:5px;border:none}
.skv-hl .skv-v{color:var(--am);font-size:13px}
/* Pagination */
.pages{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--s1);border:1px solid var(--b1);border-top:none;border-radius:0 0 var(--r3) var(--r3);flex-wrap:wrap;gap:7px}
.pb{padding:3px 8px;border-radius:4px;font-size:12px;background:var(--s2);border:1px solid var(--b1);color:var(--t2);cursor:pointer;transition:all .1s}
.pb:hover:not(:disabled){border-color:var(--am);color:var(--am)}.pb:disabled{opacity:.3;cursor:default}
/* Progress */
.pbar{height:4px;background:var(--s2);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#f0b429,#fbbf24)}
/* Chips */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .1s}
.con{background:var(--amb2);color:var(--am);border-color:rgba(240,180,41,.3)}
.cof{background:var(--s2);color:var(--t3);border-color:var(--b1)}.cof:hover{color:var(--t1);border-color:var(--b2)}
/* Quick action */
.qa{display:flex;align-items:center;gap:9px;padding:10px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);cursor:pointer;transition:all .1s}
.qa:hover{border-color:var(--am);transform:translateY(-1px)}
.qa-t{font-size:12px;font-weight:600;color:var(--t1)}.qa-s{font-size:10px;color:var(--t3)}
/* Legal box */
.lbox{background:var(--amb);border:1px solid rgba(240,180,41,.25);border-radius:8px;padding:8px 11px;font-size:11px;color:var(--am);line-height:1.55;margin-bottom:11px}
.lbox strong{color:var(--am)}
/* Empty */
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
.ei{font-size:30px;opacity:.2;margin-bottom:9px}.et{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:4px}.es{font-size:11px}
/* Akte */
.ar{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(48,54,61,.25);cursor:pointer}
.ar:last-child{border-bottom:none}.ar-l{font-size:11px;font-weight:600;color:var(--am)}.ar-s{font-size:10px;color:var(--t3)}.ar-d{font-size:9px;color:var(--t3);margin-left:auto;flex-shrink:0}
/* Login */
#lr{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.lb{width:420px;background:linear-gradient(160deg,rgba(22,27,34,.99),rgba(13,18,26,1));border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:34px 30px;box-shadow:0 30px 80px rgba(0,0,0,.75)}
.lg{position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(240,180,41,.09),transparent 70%);pointer-events:none}
.dc{padding:7px 9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:7px;cursor:pointer;transition:all .1s}
.dc:hover{background:rgba(240,180,41,.07);border-color:rgba(240,180,41,.2);transform:translateY(-1px)}
/* Drop zone */
.dz{border:2px dashed var(--b2);border-radius:var(--r3);padding:26px 20px;text-align:center;cursor:pointer;transition:all .14s}.dz:hover{border-color:var(--am);background:var(--amb)}
/* Artikel specific */
.art-tabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:16px}
.atab{padding:8px 15px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .1s}
.atab:hover{color:var(--t1)}.atab.on{color:var(--am);border-bottom-color:var(--am);font-weight:600}
/* Misc */
.mono{font-family:monospace}.c-am{color:var(--am)}.c-gn{color:var(--gn)}.c-rd{color:var(--rd)}.c-bl{color:var(--bl)}.c-t2{color:var(--t2)}
.flex{display:flex}.aic{align-items:center}.aist{align-items:flex-start}.jb{justify-content:space-between}.je{justify-content:flex-end}
.g1{gap:4px}.g-2{gap:8px}.g-3{gap:12px}.g-4{gap:16px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}
.wf{width:100%}.ovx{overflow-x:auto}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(240,180,41,.2);border-top-color:var(--am);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ver{position:fixed;bottom:7px;right:10px;font-size:9px;color:rgba(240,180,41,.25);pointer-events:none;z-index:999;font-family:monospace}
@media(max-width:1100px){.g4{grid-template-columns:1fr 1fr}.g23{grid-template-columns:1fr}}
</style>
</head>

const eur=(n)=>parseFloat(n||0).toLocaleString('de-DE',{style:'currency',currency:'EUR'});
const today=()=>{const d=new Date();return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;};
const addDays=(ds,n)=>{if(!ds)return '';const p=ds.split('.');const d=new Date(p[2],p[1]-1,p[0]);d.setDate(d.getDate()+n);return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;};
const nextNr=(list,prefix,yr)=>{const nums=list.filter(x=>x.nr?.includes(`${prefix}-${yr}`)).map(x=>parseInt(x.nr.split('-').pop())||0);return `${prefix}-${yr}-${String((nums.length?Math.max(...nums):0)+1).padStart(3,'0')}`;};

function useData(key,def){
  const [d,setD]=useState(()=>ls.get(`if_${key}`,def));
  const set=useCallback(v=>{const val=typeof v==='function'?v(ls.get(`if_${key}`,def)):v;ls.set(`if_${key}`,val);setD(val);},[key]);
  return [d,set];
}

// ── PAGINATION ─────────────────────────────────────────────────
function usePg(data,pp=25){
  const [page,setPage]=useState(1);
  const [perPage,setPerPage]=useState(pp);
  useEffect(()=>setPage(1),[data?.length]);
  const total=data?.length||0;
  const totalPages=Math.max(1,Math.ceil(total/perPage));
  const sliced=(data||[]).slice((page-1)*perPage,page*perPage);
  return {sliced,page,setPage,perPage,setPerPage,total,totalPages};
}

function Pagination({total,page,setPage,perPage,setPerPage,totalPages}){
  const from=Math.min((page-1)*perPage+1,total),to=Math.min(page*perPage,total);
  return(
    <div className="pages">
      <span style={{fontSize:11,color:'var(--t3)'}}>{from}–{to} von <b style={{color:'var(--t2)'}}>{total}</b></span>
      <div className="flex g-2 aic">
        <button className="pb" disabled={page<=1} onClick={()=>setPage(1)}>«</button>
        <button className="pb" disabled={page<=1} onClick={()=>setPage(p=>p-1)}>‹</button>
        <span style={{fontSize:11,color:'var(--t2)',padding:'0 7px'}}>Seite {page}/{totalPages}</span>
        <button className="pb" disabled={page>=totalPages} onClick={()=>setPage(p=>p+1)}>›</button>
        <button className="pb" disabled={page>=totalPages} onClick={()=>setPage(totalPages)}>»</button>
      </div>
      <select className="inp" style={{width:65,padding:'3px 6px',fontSize:11}} value={perPage} onChange={e=>{setPerPage(+e.target.value);setPage(1);}}>
        {[10,25,50,100].map(n=><option key={n}>{n}</option>)}
      </select>
    </div>
  );
}

  <body>

    <div style="display:flex;justify-content:space-between;margin-bottom:8mm">
      <div>

    </div>

    </div>

  </div></body></html>`;
  const w=window.open('','_blank','width=900,height=700');
  if(w){w.document.write(html);w.document.close();}
  else alert('Popup blockiert! Bitte Popup-Blocker deaktivieren.');
}

// ── DATEV EXPORT ──────────────────────────────────────────────
function datevExport(inv,cfg){
  const now=new Date();
  const ds=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const ts=`${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}000`;
  const p=inv.date.split('.');
  const bd=`${p[0].padStart(2,'0')}${p[1].padStart(2,'0')}`;
  const cn=cfg.datev_consultant||'1001',cl=cfg.datev_client||'12345';
  const yr=String(now.getFullYear()).slice(-2);
  const erloes=cfg.skr==='04'?'4400':'8400';
  const row=`${Math.abs(inv.gross).toFixed(2).replace('.',',')};"${inv.gross<0?'H':'S'}";"EUR";;;"10000";"${erloes}";"9";"${bd}";"${inv.nr}";"${inv.nr}";;"${(inv.isStorno?'Storno ':'')+inv.nr} ${inv.customer}"`;
  const csv=`"EXTF";700;21;"Buchungsstapel";7;${ds}${ts};"";"RE";"";;${cn};${cl};${yr}01;0;${yr}01;${yr}12;"${(cfg.company||'').replace(/"/g,'""')}";;;"EUR";;0;;;
`+
    `"Umsatz (ohne Soll/Haben-Kz)";"Soll/Haben-Kennzeichen";"WKZ Umsatz";"Kurs";"Basis-Umsatz";"WKZ Basis-Umsatz";"Konto";"Gegenkonto (ohne BU-Schlüssel)";"BU-Schlüssel";"Belegdatum";"Belegfeld 1";"Belegfeld 2";"Skonto";"Buchungstext"
`+
    row+'
';
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`DATEV_${inv.nr}_${ds}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ── ITEM EDITOR ───────────────────────────────────────────────
function ItemEditor({items,setItems,artikel}){
  const updItem=(id,f,v)=>setItems(p=>p.map(it=>{
    if(it.id!==id)return it;
    const u={...it,[f]:f==='qty'||f==='price'?+v:v};
    if(f==='qty'||f==='price')u.total=+(u.qty||0)*(+(u.price||0));
    return u;
  }));
  const net=items.reduce((s,it)=>s+(it.total||0),0);
  const vatAmt=net*0.19;
  return(
    <div>
      <div style={{fontWeight:600,fontSize:10,textTransform:'uppercase',letterSpacing:.8,marginBottom:7,color:'var(--t2)'}}>Positionen</div>
      {items.map((it,i)=>(
        <div key={it.id} style={{display:'grid',gridTemplateColumns:'2fr 50px 55px 80px 75px 26px',gap:4,marginBottom:4,alignItems:'center'}}>
          <select className="inp" style={{fontSize:11}} value={artikel.find(a=>a.name===it.desc)?.id||''} onChange={e=>{
            const a=artikel.find(x=>x.id===e.target.value);
            if(a)setItems(prev=>prev.map((x,j)=>j===i?{...x,desc:a.name,unit:a.unit,price:a.price,total:x.qty*a.price}:x));
          }}>
            <option value="">— Artikel oder Freitext —</option>
            {artikel.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
          <input className="inp" style={{fontSize:11}} type="number" value={it.qty} onChange={e=>updItem(it.id,'qty',e.target.value)} placeholder="Anz."/>
          <input className="inp" style={{fontSize:11}} value={it.unit||'h'} onChange={e=>updItem(it.id,'unit',e.target.value)}/>
          <input className="inp" style={{fontSize:11}} type="number" value={it.price} onChange={e=>updItem(it.id,'price',e.target.value)} placeholder="€/Einh."/>
          <input className="inp" style={{fontSize:11,color:'var(--am)',fontWeight:600}} value={(it.total||0).toFixed(2)} readOnly/>
          <button className="btn bd sm" style={{padding:'3px 5px'}} onClick={()=>setItems(p=>p.filter(x=>x.id!==it.id))}>✕</button>
        </div>
      ))}
      {items.length===0&&<div style={{fontSize:11,color:'var(--t3)',padding:'8px 0',textAlign:'center'}}>Keine Positionen</div>}
      <button className="btn bg sm mb3" onClick={()=>setItems(p=>[...p,{id:uid('IT'),desc:'',qty:1,unit:'h',price:0,total:0}])}>+ Position hinzufügen</button>
      <div style={{background:'var(--s2)',border:'1px solid var(--b1)',borderRadius:8,padding:'9px 12px'}}>
        <div className="flex jb" style={{fontSize:12,padding:'2px 0',borderBottom:'1px solid var(--b1)'}}><span>Netto</span><span className="mono">{eur(net)}</span></div>
        <div className="flex jb" style={{fontSize:12,padding:'2px 0',borderBottom:'1px solid var(--b1)'}}><span>MwSt. 19%</span><span className="mono">{eur(vatAmt)}</span></div>
        <div className="flex jb" style={{fontSize:13,padding:'5px 0',fontWeight:700}}><span>Brutto</span><span className="mono c-am">{eur(net+vatAmt)}</span></div>
      </div>
    </div>
  );
}

// ── RECHNUNGEN (§14 UStG / GoBD) ──────────────────────────────
function Invoices(){
  const {invoices,setInvoices,kunden,artikel,toast}=useContext(Ctx);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [items,setItems]=useState([]);
  const [filter,setFilter]=useState('all');
  const filtered=filter==='all'?invoices:invoices.filter(i=>i.status===filter);
  const pg=usePg(filtered);
  const yr=new Date().getFullYear();
  const net=items.reduce((s,it)=>s+(it.total||0),0);
  const vatAmt=Math.round(net*0.19*100)/100;
  const gross=net+vatAmt;

  const openNew=()=>{
    setForm({nr:nextNr(invoices,'RE',yr),date:today(),due:addDays(today(),14),serviceDate:today(),status:'draft',notes:'',customerId:'',customer:''});
    setItems([{id:uid('IT'),desc:'',qty:1,unit:'h',price:0,total:0}]);
    setModal('edit');
  };
  const openEdit=(inv)=>{
    if(inv.immutable||inv.status!=='draft'){toast('Versendete Rechnungen sind unveränderlich (GoBD §146)','e');return;}
    setForm({...inv});
    setItems((inv.items||[]).map(it=>({...it,id:it.id||uid('IT')})));
    setModal('edit');
  };
  const save=()=>{
    if(!form.nr||!form.date){toast('Bitte Rechnungsnummer und Datum angeben','e');return;}
    const k=kunden.find(c=>c.id===form.customerId);
    const inv={...form,customer:k?.company||form.customer,items,net,vatAmt,gross};
    setInvoices(prev=>inv.id?prev.map(i=>i.id===inv.id?inv:i):[...prev,{...inv,id:uid('RE'),created:today()}]);
    setModal(null);toast('✓ Rechnung gespeichert','s');
  };
  const storno=(id)=>{
    const inv=invoices.find(i=>i.id===id);
    if(!inv||inv.status==='cancelled'){toast('Bereits storniert','w');return;}
    if(!confirm(`Rechnung ${inv.nr} stornieren?
Gemäß §14 UStG wird eine Stornorechnung erstellt.`))return;
    const sNr=inv.nr.replace('RE-','SRE-');
    const sInv={id:uid('SRE'),nr:sNr,customer:inv.customer,customerId:inv.customerId,date:today(),due:today(),serviceDate:today(),
      items:(inv.items||[]).map(it=>({...it,total:-(it.total||0),price:-(it.price||0)})),
      net:-(inv.net||0),vat:inv.vat||19,vatAmt:-(inv.vatAmt||0),gross:-(inv.gross||0),
      status:'storno',isStorno:true,stornoRef:inv.nr,notes:`Stornorechnung zu ${inv.nr}`,created:today(),immutable:true};
    setInvoices(p=>[...p.map(i=>i.id===id?{...i,status:'cancelled',immutable:true}:i),sInv]);
    toast(`✓ Stornorechnung ${sNr} erstellt`,'s');
  };
  const markPaid=(id)=>{setInvoices(p=>p.map(i=>i.id===id?{...i,status:'paid',immutable:true}:i));toast('✓ Als bezahlt markiert','s');};
  const pdf=(inv)=>{const cfg=ls.get('if_cfg',{});makePDF('rechnung',inv,kunden,cfg);toast('✓ PDF geöffnet','s');};
  const dExport=(inv)=>{const cfg=ls.get('if_cfg',{});datevExport(inv,cfg);toast('✓ DATEV CSV exportiert','s');};
  const FILTERS=[{k:'all',l:'Alle'},{k:'draft',l:'Entwurf'},{k:'sent',l:'Gesendet'},{k:'open',l:'Offen'},{k:'overdue',l:'Überfällig'},{k:'paid',l:'Bezahlt'},{k:'cancelled',l:'Storniert'}];

  return(
    <div>
      <Topbar title="Rechnungen / Gutschriften" actions={[<button key="n" className="btn bp sm" onClick={openNew}>+ Neue Rechnung</button>]}/>
      <div className="content">
        <div className="g4 mb3">
          <div className="kpi"><div className="kpi-l">Umsatz gesamt</div><div className="kpi-v" style={{fontSize:16}}>{eur(invoices.reduce((s,i)=>s+i.gross,0))}</div></div>
          <div className="kpi"><div className="kpi-l">Offen</div><div className="kpi-v c-am" style={{fontSize:16}}>{eur(invoices.filter(i=>i.status==='open'||i.status==='overdue').reduce((s,i)=>s+i.gross,0))}</div></div>
          <div className="kpi"><div className="kpi-l">Bezahlt</div><div className="kpi-v c-gn" style={{fontSize:16}}>{eur(invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+i.gross,0))}</div></div>
          <div className="kpi"><div className="kpi-l">Überfällig</div><div className="kpi-v c-rd">{invoices.filter(i=>i.status==='overdue').length}</div></div>
        </div>
        <div className="lbox mb3">
          <strong>§14 UStG / GoBD:</strong> Versendete/bezahlte Rechnungen sind unveränderlich. Stornierung via ⊗-Button erzeugt automatisch eine Stornorechnung mit negativem Betrag. <strong>E-Rechnung (XRechnung/ZUGFeRD) ab 01.01.2025 B2B-Pflicht.</strong>
        </div>
        <div className="flex g-2 mb3" style={{flexWrap:'wrap'}}>
          {FILTERS.map(f=><div key={f.k} className={`chip ${filter===f.k?'con':'cof'}`} onClick={()=>setFilter(f.k)}>{f.l}</div>)}
        </div>
        <div className="card" style={{padding:0}}>
          <div className="ovx">
            <table className="tbl">
              <thead><tr><th>Nummer</th><th>Kunde</th><th>Datum</th><th>Fällig</th><th className="r">Brutto</th><th>Status</th><th>Aktionen</th></tr></thead>
              <tbody>
                {pg.sliced.map(inv=>{
                  const editable=inv.status==='draft'&&!inv.immutable;
                  const canStorno=!inv.isStorno&&inv.status!=='cancelled'&&inv.status!=='draft'&&inv.status!=='storno';
                  return(
                    <tr key={inv.id} style={{opacity:inv.status==='cancelled'||inv.isStorno?.45:1}}>
                      <td className="mono">{inv.nr}{inv.isStorno&&<span className="badge tr" style={{marginLeft:4,fontSize:7}}>STORNO</span>}{inv.immutable&&!inv.isStorno&&<span style={{marginLeft:4,fontSize:10}}>🔒</span>}</td>
                      <td className="strong">{inv.customer}</td>
                      <td>{inv.date}</td><td>{inv.due||'—'}</td>
                      <td className={`r mono ${inv.gross<0?'c-rd':''}`}>{eur(inv.gross)}</td>
                      <td><SBadge s={inv.status}/></td>
                      <td>
                        <div className="flex g-2">
                          <button className="btn bg sm" title="PDF" onClick={()=>pdf(inv)}>📄</button>
                          <button className="btn bc sm" title="DATEV Export" onClick={()=>dExport(inv)}>📊</button>
                          {(inv.status==='open'||inv.status==='overdue')&&<button className="btn bs sm" onClick={()=>markPaid(inv.id)}>✓</button>}
                          {editable&&<button className="btn bg sm" onClick={()=>openEdit(inv)}>✏️</button>}
                          {canStorno&&<button className="btn bd sm" title="Stornieren" onClick={()=>storno(inv.id)}>⊗</button>}
                          {editable&&<button className="btn bd sm" onClick={()=>{if(!confirm('Entwurf löschen?'))return;setInvoices(p=>p.filter(i=>i.id!==inv.id));}}>✕</button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
                {!filtered.length&&<tr><td colSpan="7" style={{textAlign:'center',padding:28,color:'var(--t3)'}}>Keine Rechnungen</td></tr>}
              </tbody>
            </table>
          </div>
          {filtered.length>pg.perPage&&<Pagination {...pg}/>}
        </div>
      </div>
      <Modal open={modal==='edit'} onClose={()=>setModal(null)} title={form.id?'Rechnung bearbeiten (Entwurf)':'Neue Rechnung'} wide>
        <div className="lbox"><strong>§14 UStG:</strong> Nach Versand unveränderlich (GoBD §146). Pflichtangaben: Steuernr., Rechnungsnr., Rechnungs- und Leistungsdatum, Netto/MwSt/Brutto.</div>
        <div className="g2 mb3 g-3">
          <div><label className="lbl">Rechnungsnummer</label><input className="inp" value={form.nr||''} onChange={e=>setForm(f=>({...f,nr:e.target.value}))}/></div>
          <div><label className="lbl">Rechnungsdatum</label><input className="inp" value={form.date||''} placeholder="TT.MM.JJJJ" onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
          <div><label className="lbl">Kunde</label>
            <select className="inp" value={form.customerId||''} onChange={e=>{const k=kunden.find(c=>c.id===e.target.value);setForm(f=>({...f,customerId:e.target.value,customer:k?.company||''}));}}>
              <option value="">— Freitext —</option>
              {kunden.filter(k=>k.active).map(k=><option key={k.id} value={k.id}>{k.company}</option>)}
            </select>
          </div>
          <div><label className="lbl">Leistungsdatum</label><input className="inp" value={form.serviceDate||''} placeholder="TT.MM.JJJJ" onChange={e=>setForm(f=>({...f,serviceDate:e.target.value}))}/></div>
          <div><label className="lbl">Status</label>
            <select className="inp" value={form.status||'draft'} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
              {['draft','sent','open','paid'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <ItemEditor items={items} setItems={setItems} artikel={artikel}/>
        <div className="mt3 mb3"><label className="lbl">Notizen / Zahlungshinweis</label><textarea className="inp" rows="2" value={form.notes||''} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
        <div className="flex g-2"><button className="btn bp wf" onClick={save}>✓ Speichern</button><button className="btn bg" onClick={()=>setModal(null)}>Abbrechen</button></div>
      </Modal>
    </div>
  );
}

// ── ARTIKEL (mit Detail-View wie Screenshot) ──────────────────
function Artikel(){
  const {artikel,setArtikel,toast,setView,setDetail}=useContext(Ctx);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [cf,setCf]=useState('');
  const filtered=cf?artikel.filter(a=>a.cat===cf):artikel;
  const pg=usePg(filtered);
  const CATS=['Dienstleistung','Produkt','Lizenz','Abo','Material'];
  const ICOS={Dienstleistung:'🛠️',Produkt:'📦',Lizenz:'🔑',Abo:'🔄',Material:'🧱'};
  const openEdit=(a=null)=>{setForm(a?{...a}:{name:'',desc:'',unit:'h',price:0,vat:19,cat:'Dienstleistung',active:true,ek:0});setModal('edit');};
  const save=()=>{
    if(!form.name){toast('Bitte Namen eingeben','e');return;}
    setArtikel(prev=>{
      if(form.id)return prev.map(a=>a.id===form.id?form:a);
      const nxt=Math.max(0,...prev.map(a=>parseInt(a.nr?.replace('A-',''))||0))+1;
      return [...prev,{...form,id:uid('ART'),nr:'A-'+String(nxt).padStart(3,'0')}];
    });
    setModal(null);toast('✓ Artikel gespeichert','s');
  };
  const del=(id)=>{if(!confirm('Artikel löschen?'))return;setArtikel(p=>p.filter(a=>a.id!==id));toast('Gelöscht','s');};
  return(
    <div>
      <Topbar title="Artikel" actions={[<button key="n" className="btn bp sm" onClick={()=>openEdit()}>+ Neuer Artikel</button>]}/>
      <div className="content">
        <div className="g3 mb4">
          <div className="kpi"><div className="kpi-l">Artikel</div><div className="kpi-v">{artikel.length}</div></div>
          <div className="kpi"><div className="kpi-l">Dienstleistungen</div><div className="kpi-v">{artikel.filter(a=>a.cat==='Dienstleistung').length}</div></div>
          <div className="kpi"><div className="kpi-l">Ø VK-Preis</div><div className="kpi-v c-am" style={{fontSize:16}}>{eur(artikel.reduce((s,a)=>s+a.price,0)/Math.max(artikel.length,1))}</div></div>
        </div>
        <div className="flex g-2 mb3" style={{flexWrap:'wrap'}}>
          <div className={`chip ${cf===''?'con':'cof'}`} onClick={()=>setCf('')}>Alle</div>
          {CATS.map(c=><div key={c} className={`chip ${cf===c?'con':'cof'}`} onClick={()=>setCf(c)}>{c}</div>)}
        </div>
        {pg.sliced.map(a=>(
          <div key={a.id} className="card mb2 flex aic g-3" style={{cursor:'pointer'}} onClick={()=>{setDetail({type:'artikel',id:a.id});setView('art-detail');}}>
            <div style={{width:36,height:36,borderRadius:9,background:'var(--s2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{ICOS[a.cat]||'📋'}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13}}>{a.name} <span style={{fontSize:10,color:'var(--t3)',fontFamily:'monospace'}}>{a.nr}</span></div>
              <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{a.desc}</div>
              <div className="flex g-2 mt1">
                <span className="badge tb">{a.cat}</span>
                <span className="badge ta" style={{fontFamily:'monospace'}}>{eur(a.price)} / {a.unit}</span>
                <span className="badge tk">MwSt. {a.vat}%</span>
                {a.ek>0&&<span className="badge" style={{background:'var(--rdb)',color:'var(--rd)'}}>EK {eur(a.ek)}</span>}
                <span className={`badge ${a.active?'tg':'tr'}`}>{a.active?'Aktiv':'Inaktiv'}</span>
              </div>
            </div>
            <div className="flex g-2" onClick={e=>e.stopPropagation()}>
              <button className="btn bg sm" onClick={()=>{setDetail({type:'artikel',id:a.id});setView('art-detail');}}>→</button>
              <button className="btn bg sm" onClick={()=>openEdit(a)}>✏️</button>
              <button className="btn bd sm" onClick={()=>del(a.id)}>✕</button>
            </div>
          </div>
        ))}
        {!filtered.length&&<div className="empty"><div className="ei">📦</div><div className="et">Keine Artikel</div></div>}

      </div>
      <Modal open={modal==='edit'} onClose={()=>setModal(null)} title={form.id?'Artikel bearbeiten':'Neuer Artikel'}>
        <div className="mb3"><label className="lbl">Bezeichnung *</label><input className="inp" value={form.name||''} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
        <div className="mb3"><label className="lbl">Beschreibung</label><input className="inp" value={form.desc||''} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/></div>
        <div className="g2 mb3 g-3">
          <div><label className="lbl">Einheit</label>
            <select className="inp" value={form.unit||'h'} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}>
              {['h','Stück','Pauschal','Monat','Jahr','km','Tag'].map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
          <div><label className="lbl">VK-Preis netto €</label><input className="inp" type="number" step="0.01" value={form.price||0} onChange={e=>setForm(f=>({...f,price:+e.target.value}))}/></div>
          <div><label className="lbl">EK-Preis netto €</label><input className="inp" type="number" step="0.01" value={form.ek||0} onChange={e=>setForm(f=>({...f,ek:+e.target.value}))}/></div>

            <select className="inp" value={form.cat||'Dienstleistung'} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>
              {['Dienstleistung','Produkt','Lizenz','Abo','Material'].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="mb4 flex aic g-2" style={{fontSize:12}}>
          <input type="checkbox" id="aa" checked={!!form.active} onChange={e=>setForm(f=>({...f,active:e.target.checked}))}/>
          <label htmlFor="aa">Aktiver Artikel</label>
        </div>
        {form.price>0&&form.ek>0&&(
          <div style={{background:'var(--s2)',border:'1px solid var(--b1)',borderRadius:8,padding:'9px 12px',marginBottom:12,fontSize:11}}>
            <div style={{fontWeight:600,marginBottom:4}}>Spanne</div>
            <div className="flex jb"><span>VK netto</span><span style={{color:'var(--gn)',fontFamily:'monospace'}}>{eur(form.price)}</span></div>
            <div className="flex jb"><span>EK netto</span><span style={{color:'var(--rd)',fontFamily:'monospace'}}>{eur(form.ek)}</span></div>
            <div className="flex jb" style={{borderTop:'1px solid var(--b1)',marginTop:4,paddingTop:4,fontWeight:700}}>
              <span>Spanne</span>
              <span style={{color:'var(--am)',fontFamily:'monospace'}}>{eur(form.price-form.ek)} ({((form.price-form.ek)/form.price*100).toFixed(1)}%)</span>
            </div>
          </div>
        )}
        <div className="flex g-2"><button className="btn bp wf" onClick={save}>✓ Speichern</button><button className="btn bg" onClick={()=>setModal(null)}>Abbrechen</button></div>
      </Modal>
    </div>
  );
}

// ── ZEITERFASSUNG ─────────────────────────────────────────────
function Zeiterfassung(){
  const {projekte,toast}=useContext(Ctx);
  const [entries,setEntries]=useData('zeit',[]);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [secs,setSecs]=useState(0);
  const [running,setRunning]=useState(false);
  const timerRef=useRef(null);
  const pg=usePg(entries);
  const sess=ls.get('if_sess',{});
  const startStop=()=>{
    if(!running){setRunning(true);timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);}
    else{clearInterval(timerRef.current);setRunning(false);const h=(secs/3600).toFixed(2);setForm(f=>({...f,hours:h}));setSecs(0);toast(`Timer gestoppt: ${h} h`,'s');}
  };
  useEffect(()=>()=>clearInterval(timerRef.current),[]);
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
  const ts=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const openNew=()=>{setForm({date:today(),user:sess.name||'',project:'',desc:'',hours:0,rate:120,status:'open'});setModal('edit');};
  const save=()=>{
    if(!form.desc){toast('Bitte Beschreibung eingeben','e');return;}
    const total=(+form.hours||0)*(+form.rate||0);
    setEntries(p=>form.id?p.map(e=>e.id===form.id?{...form,total}:e):[...p,{...form,total,id:uid('Z'),created:today()}]);
    setModal(null);toast('✓ Zeit gebucht','s');
  };
  const total=entries.reduce((s,e)=>s+(+e.hours||0),0);
  const open=entries.filter(e=>e.status==='open').reduce((s,e)=>s+(+e.hours||0),0);
  const billed=entries.filter(e=>e.status==='billed').reduce((s,e)=>s+(+e.total||0),0);
  return(
    <div>
      <Topbar title="Zeiterfassung" actions={[<button key="n" className="btn bp sm" onClick={openNew}>+ Zeit buchen</button>]}/>
      <div className="content">
        <div className="g4 mb4">
          <div className="kpi"><div className="kpi-l">Stunden gesamt</div><div className="kpi-v">{total.toFixed(1)} h</div></div>
          <div className="kpi"><div className="kpi-l">Nicht abgerechnet</div><div className="kpi-v c-am">{open.toFixed(1)} h</div></div>
          <div className="kpi"><div className="kpi-l">Abgerechnet</div><div className="kpi-v c-gn">{eur(billed)}</div></div>
          <div className="kpi">
            <div className="kpi-l">Stoppuhr</div>
            <div style={{fontFamily:'monospace',fontSize:20,fontWeight:700,color:'var(--am)',textAlign:'center',padding:'3px 0'}}>{ts}</div>
            <button className={`btn ${running?'bd':'bs'} wf mt1 sm`} onClick={startStop}>{running?'⏹ Stop':'▶ Start'}</button>
          </div>
        </div>
        <div className="card" style={{padding:0}}>
          <div className="ovx">
            <table className="tbl">
              <thead><tr><th>Datum</th><th>Mitarbeiter</th><th>Beschreibung</th><th className="r">Stunden</th><th className="r">Satz</th><th className="r">Gesamt</th><th>Status</th><th>Aktion</th></tr></thead>
              <tbody>
                {pg.sliced.map(e=>(
                  <tr key={e.id}>
                    <td>{e.date}</td><td>{e.user}</td>
                    <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.desc}</td>
                    <td className="r">{e.hours} h</td><td className="r">{eur(e.rate)}</td>
                    <td className="r mono">{eur(e.total)}</td>
                    <td><SBadge s={e.status}/></td>
                    <td>
                      <div className="flex g-2">
                        {e.status==='open'&&<button className="btn bs sm" onClick={()=>{setEntries(p=>p.map(x=>x.id===e.id?{...x,status:'billed'}:x));toast('Abgerechnet','s');}}>✓</button>}
                        <button className="btn bg sm" onClick={()=>{setForm({...e});setModal('edit');}}>✏️</button>
                        <button className="btn bd sm" onClick={()=>{if(!confirm('Löschen?'))return;setEntries(p=>p.filter(x=>x.id!==e.id));}}>✕</button>
                      </div>
                    </td>
                  </tr>
                ))}
                {!entries.length&&<tr><td colSpan="8" style={{textAlign:'center',padding:28,color:'var(--t3)'}}>Keine Zeiteinträge</td></tr>}
              </tbody>
            </table>
          </div>
          {entries.length>pg.perPage&&<Pagination {...pg}/>}
        </div>
      </div>
      <Modal open={modal==='edit'} onClose={()=>setModal(null)} title="Zeit buchen">
        <div className="mb3"><label className="lbl">Beschreibung *</label><input className="inp" value={form.desc||''} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/></div>
        <div className="g2 mb3 g-3">
          <div><label className="lbl">Datum</label><input className="inp" value={form.date||''} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
          <div><label className="lbl">Mitarbeiter</label><input className="inp" value={form.user||''} onChange={e=>setForm(f=>({...f,user:e.target.value}))}/></div>
          <div><label className="lbl">Stunden</label><input className="inp" type="number" step="0.25" value={form.hours||0} onChange={e=>setForm(f=>({...f,hours:+e.target.value}))}/></div>
          <div><label className="lbl">Stundensatz €</label><input className="inp" type="number" value={form.rate||120} onChange={e=>setForm(f=>({...f,rate:+e.target.value}))}/></div>
        </div>
        <div className="flex g-2"><button className="btn bp wf" onClick={save}>✓ Speichern</button><button className="btn bg" onClick={()=>setModal(null)}>Abbrechen</button></div>
      </Modal>
    </div>
  );
}

// ── NUTZERVERWALTUNG ──────────────────────────────────────────
function Users(){
  const {toast}=useContext(Ctx);
  const [users,setUsers]=useState(()=>ls.get('if_users',USERS));
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const ROLES=['superadmin','management','employee','ins_portal'];
  const RL={superadmin:'👑 Superadmin',management:'💼 Geschäftsführung',employee:'👤 Mitarbeiter',ins_portal:'🛡️ Makler'};
  const AVC={superadmin:'av av-sa',management:'av av-mg',employee:'av av-em',ins_portal:'av av-ip'};
  const openEdit=(u=null)=>{setForm(u?{...u,pw:''}:{name:'',email:'',dept:'',role:'employee',pw:'',active:true});setModal('edit');};
  const save=()=>{
    if(!form.name||!form.email){toast('Name und E-Mail erforderlich','e');return;}
    const saved={...form};
    if(!saved.pw&&saved.id){const ex=users.find(u=>u.id===saved.id);if(ex)saved.pw=ex.pw;}
    if(!saved.pw){toast('Bitte Passwort setzen','e');return;}
    const updated=saved.id?users.map(u=>u.id===saved.id?saved:u):[...users,{...saved,id:Math.max(0,...users.map(u=>u.id))+1}];
    setUsers(updated);ls.set('if_users',updated);setModal(null);toast('✓ Nutzer gespeichert','s');
  };
  const toggle=(id)=>{const u=users.map(x=>x.id===id?{...x,active:!x.active}:x);setUsers(u);ls.set('if_users',u);toast('Aktualisiert','s');};
  return(
    <div>
      <Topbar title="Nutzerverwaltung" actions={[<button key="n" className="btn bp sm" onClick={()=>openEdit()}>+ Neuer Nutzer</button>]}/>
      <div className="content">
        <div className="g2 mb4">
          <div className="kpi"><div className="kpi-l">Nutzer</div><div className="kpi-v">{users.length}</div></div>
          <div className="kpi"><div className="kpi-l">Aktiv</div><div className="kpi-v c-gn">{users.filter(u=>u.active).length}</div></div>
        </div>
        <div className="card" style={{padding:0}}>
          <table className="tbl">
            <thead><tr><th>Name</th><th>E-Mail</th><th>Rolle</th><th>Abteilung</th><th>Status</th><th>Aktionen</th></tr></thead>
            <tbody>
              {users.map(u=>{
                const ini=u.name.split(' ').map(n=>n[0]||'').join('').slice(0,2).toUpperCase();
                return(
                  <tr key={u.id}>
                    <td><div className="flex aic g-2"><div className={AVC[u.role]||'av av-em'} style={{width:24,height:24,fontSize:8}}>{ini}</div><span style={{fontWeight:600}}>{u.name}</span></div></td>
                    <td style={{fontSize:11,color:'var(--t3)'}}>{u.email}</td>
                    <td><span className="badge ta">{RL[u.role]||u.role}</span></td>
                    <td style={{fontSize:11}}>{u.dept}</td>
                    <td><span className={`badge ${u.active?'tg':'tr'}`}>{u.active?'Aktiv':'Inaktiv'}</span></td>
                    <td><div className="flex g-2">
                      <button className="btn bg sm" onClick={()=>openEdit(u)}>✏️</button>
                      <button className={`btn sm ${u.active?'bd':'bs'}`} onClick={()=>toggle(u.id)}>{u.active?'Deakt.':'Akt.'}</button>
                    </div></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      <Modal open={modal==='edit'} onClose={()=>setModal(null)} title={form.id?'Nutzer bearbeiten':'Neuer Nutzer'}>
        <div className="g2 mb3 g-3">
          <div><label className="lbl">Name *</label><input className="inp" value={form.name||''} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
          <div><label className="lbl">E-Mail *</label><input className="inp" type="email" value={form.email||''} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
          <div><label className="lbl">Abteilung</label><input className="inp" value={form.dept||''} onChange={e=>setForm(f=>({...f,dept:e.target.value}))}/></div>
          <div><label className="lbl">Rolle</label>
            <select className="inp" value={form.role||'employee'} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
              {ROLES.map(r=><option key={r} value={r}>{RL[r]}</option>)}
            </select>
          </div>
        </div>
        <div className="mb4"><label className="lbl">Passwort{form.id?' (leer = unverändert)':' *'}</label><input className="inp" type="password" value={form.pw||''} onChange={e=>setForm(f=>({...f,pw:e.target.value}))}/></div>
        <div className="flex g-2"><button className="btn bp wf" onClick={save}>✓ Speichern</button><button className="btn bg" onClick={()=>setModal(null)}>Abbrechen</button></div>
      </Modal>
    </div>
  );
}

        <div className="flex g-2">
          <button className="btn bg sm" onClick={pdf}>📄 PDF</button>
          <button className="btn bg sm" onClick={onBack}>✏️ Bearbeiten</button>
        </div>
      </div>
      <div className="content">
        <div className="det-tabs">
          {[{k:'uebersicht',l:'Übersicht'},{k:'positionen',l:`Positionen (${a.items?.length||0})`},{k:'dokumente',l:'Dokumente'},{k:'aufgaben',l:'Aufgaben'}].map(t=>(
            <div key={t.k} className={`dtab${tab===t.k?' on':''}`} onClick={()=>setTab(t.k)}>{t.l}</div>
          ))}
        </div>
        <div className="g23">
          <div>
            {tab==='uebersicht'&&(
              <>
                <div className="dsec">
                  <div className="dsec-t">Angebotskopf</div>
                  <div className="g2 g-3">
                    <div><label className="lbl">Datum</label><div className="dfield">{a.date}</div></div>
                    <div><label className="lbl">Gültig bis</label><div className="dfield">{a.valid}</div></div>
                    <div><label className="lbl">Kunde</label><div className="dfield">{a.customer}</div></div>
                    <div><label className="lbl">Status</label><div className="dfield"><span className={`badge ${SC[a.status]||'tk'}`}>{a.status}</span></div></div>
                  </div>
                </div>
                <div className="dsec">
                  <div className="dsec-t">Positionen</div>
                  <div className="ovx">
                    <table className="tbl">
                      <thead><tr><th>Pos.</th><th>Bezeichnung</th><th className="r">Menge</th><th className="r">EP netto</th><th className="r">Steuer</th><th className="r">GP netto</th></tr></thead>
                      <tbody>{(a.items||[]).map((it,i)=>(
                        <tr key={i}><td style={{color:'var(--t3)'}}>{i+1}</td><td style={{fontWeight:600}}>{it.desc}</td><td className="r">{it.qty} {it.unit}</td><td className="r mono">{eur(it.price)}</td><td className="r" style={{color:'var(--t3)'}}>19%</td><td className="r mono c-am">{eur(it.total)}</td></tr>
                      ))}</tbody>
                    </table>
                  </div>
                  <div className="flex je mt3">
                    <div style={{width:240,background:'var(--s2)',border:'1px solid var(--b1)',borderRadius:8,padding:'9px 12px'}}>
                      <div className="flex jb" style={{fontSize:12,padding:'2px 0',borderBottom:'1px solid var(--b1)'}}><span>Netto</span><span className="mono">{eur(a.net)}</span></div>
                      <div className="flex jb" style={{fontSize:12,padding:'2px 0',borderBottom:'1px solid var(--b1)'}}><span>MwSt. 19%</span><span className="mono">{eur(a.vatAmt)}</span></div>
                      <div className="flex jb" style={{fontSize:14,padding:'5px 0',fontWeight:700}}><span>Brutto</span><span className="mono c-am">{eur(a.gross)}</span></div>
                    </div>
                  </div>
                </div>
              </>
            )}
            {tab==='positionen'&&(
              <div className="dsec"><div className="dsec-t">Alle Positionen</div>
                <table className="tbl"><thead><tr><th>Pos.</th><th>Bezeichnung</th><th className="r">Menge</th><th className="r">EP netto</th><th className="r">Steuer</th><th className="r">Rabatt</th><th className="r">GP netto</th></tr></thead>
                <tbody>{(a.items||[]).map((it,i)=>(
                  <tr key={i}><td style={{color:'var(--t3)'}}>{i+1}</td><td style={{fontWeight:600}}>{it.desc}</td><td className="r">{it.qty} {it.unit}</td><td className="r mono">{eur(it.price)}</td><td className="r" style={{color:'var(--t3)'}}>19%</td><td className="r" style={{color:'var(--t3)'}}>—</td><td className="r mono c-am">{eur(it.total)}</td></tr>
                ))}</tbody></table>
              </div>
            )}
            {tab==='dokumente'&&<div className="dsec"><div className="dsec-t">Dokumente</div><div className="dz"><div style={{fontSize:24,marginBottom:6}}>📎</div><div style={{fontSize:12}}>Datei hochladen</div></div></div>}
            {tab==='aufgaben'&&<div className="dsec"><div className="dsec-t">Aufgaben</div><div className="empty" style={{padding:24}}><div className="ei">✅</div><div className="es">Keine Aufgaben</div></div></div>}
          </div>
          <div>
            <div className="sbc">
              <div className="sbc-t">Allgemeines</div>
              <div className="skv skv-hl"><span>Angebotswert</span><span className="skv-v">{eur(a.gross)}</span></div>
              <div className="skv"><span>Nettobetrag</span><span className="skv-v">{eur(a.net)}</span></div>
              <div className="skv"><span>Anzahl Positionen</span><span className="skv-v">{a.items?.length||0}</span></div>
              <div className="skv"><span>MwSt.</span><span className="skv-v">19%</span></div>
            </div>
            <div className="sbc">
              <div className="sbc-t">Letzte Angebote ({a.customer})</div>
              {angebote.filter(x=>x.customer===a.customer&&x.id!==a.id).slice(0,4).map(x=>(
                <div key={x.id} className="ar"><div style={{flex:1}}><div className="ar-l">{x.nr}</div><div className="ar-s">{eur(x.gross)} · {x.status}</div></div><div className="ar-d">{x.date}</div></div>
              ))}
              {!angebote.filter(x=>x.customer===a.customer&&x.id!==a.id).length&&<div style={{fontSize:11,color:'var(--t3)',textAlign:'center',padding:7}}>Keine weiteren</div>}
            </div>
            <div className="sbc">
              <div className="sbc-t">Kennzahlen Kunde</div>
              <div className="skv"><span>Angebote gesamt</span><span className="skv-v">{angebote.filter(x=>x.customer===a.customer).length}</span></div>
              <div className="skv"><span>Umsatz Kunde</span><span className="skv-v">{eur(k?.revenue||0)}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
const Ctx2=Ctx;

function App(){
  const [user,setUser]=useState(()=>{
    const sess=ls.get('if_sess',null);
    if(!sess)return null;
    const users=ls.get('if_users',USERS);
    return users.find(u=>u.id===sess.id&&u.active)||null;
  });
  const [view,setView]=useState('dashboard');
  const [detail,setDetail]=useState(null);
  const [toasts,setToasts]=useState([]);
  const [kunden,setKunden]=useData('kunden',KUNDEN);
  const [artikel,setArtikel]=useData('artikel',ARTIKEL);
  const [invoices,setInvoices]=useData('invoices',INVOICES);
  const [angebote,setAngebote]=useData('angebote',ANGEBOTE);
  const [projekte,setProjekte]=useData('projekte',PROJEKTE);
  const [chancen,setChancen]=useData('chancen',CHANCEN);

  const toast=useCallback((msg,type='s')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  },[]);
  const logout=useCallback(()=>{ls.del('if_sess');setUser(null);},[]);
  const login=useCallback((u)=>{setUser(u);setView(u.role==='ins_portal'?'ins-portal':'dashboard');},[]);

  const invCount=invoices.filter(i=>i.status==='open'||i.status==='overdue').length;

  const ctx={user,kunden,setKunden,artikel,setArtikel,invoices,setInvoices,
    angebote,setAngebote,projekte,setProjekte,chancen,setChancen,
    toast,logout,setView,detail,setDetail};

  if(!user) return(
    <Ctx2.Provider value={ctx}>
      <Login onLogin={login}/>
      <Toasts list={toasts}/>
    </Ctx2.Provider>
  );

  const TITLES={
    dashboard:'Dashboard','crm-kontakte':'CRM · Kontakte','crm-kunden':'CRM · Kunden',
    'crm-interessenten':'CRM · Interessenten','crm-lieferanten':'CRM · Lieferanten',
    'crm-ereignisse':'CRM · Ereignisse','crm-chancen':'CRM · Chancen',
    'vk-angebote':'Verkauf · Angebote','vk-rahmen':'Verkauf · Rahmenaufträge',
    'vk-auftraege':'Verkauf · Aufträge','invoices':'Rechnungen / Gutschriften',
    'ek-bestellungen':'Einkauf · Bestellungen','ek-rechnungen':'Einkauf · Rechnungen',
    'ek-op':'Einkauf · OP Liste','artikel':'Artikel',
    'art-vkpreise':'Verkaufspreise','art-ekpreise':'Einkaufspreise',
    'proj-auftraege':'Projektaufträge','proj-buchungen':'Buchungsberichte',
    'projekte':'Projekt-Übersicht','zeit':'Zeiterfassung',
    'belege':'Belege & OCR','banking':'Banking','forecast':'Forecast',
    'chatbot':'KI-Assistent','analytics':'Analysen',
    'insurance':'Versicherungen','ins-portal':'Upload-Portal',
    'users':'Nutzerverwaltung','settings':'Einstellungen',
    'ang-detail':'Angebot Detail','kd-detail':'Kunden Detail','art-detail':'Artikel Detail',
  };

  const renderView=()=>{
    switch(view){
      case 'dashboard': return <Dashboard/>;
      case 'crm-kunden': return <Kunden/>;
      case 'vk-angebote': return <Angebote/>;
      case 'invoices': return <Invoices/>;
      case 'artikel': return <Artikel/>;
      case 'zeit': return <Zeiterfassung/>;
      case 'settings': return <Settings/>;
      case 'users': return <Users/>;
      case 'ang-detail':
        return detail?.type==='angebot'
          ?<AngDetail id={detail.id} onBack={()=>setView('vk-angebote')}/>
          :<Placeholder title="Angebot Detail" icon="📄"/>;
      case 'art-detail':
        return detail?.type==='artikel'
          ?<ArtikelDetail id={detail.id} onBack={()=>setView('artikel')}/>
          :<Placeholder title="Artikel Detail" icon="📦"/>;
      default: return <Placeholder title={TITLES[view]||view} icon="🚧"/>;
    }
  };

  return(
    <Ctx2.Provider value={ctx}>
      <div className="shell">
        <Sidebar user={user} view={view} setView={setView} invCount={invCount}/>
        <div className="main">{renderView()}</div>
      </div>
      <Toasts list={toasts}/>
    </Ctx2.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
