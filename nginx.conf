##############################################################
#  Nginx Konfiguration – Angebot Builder
#  Speicherpfad: /etc/nginx/sites-available/angebot
#  Symlink:      ln -s /etc/nginx/sites-available/angebot \
#                       /etc/nginx/sites-enabled/angebot
##############################################################

server {
    listen 80;
    listen [::]:80;
    server_name DEINE_DOMAIN.de www.DEINE_DOMAIN.de;

    # HTTP → HTTPS redirect (nach Certbot-Setup aktiv)
    # return 301 https://$host$request_uri;

    root /var/www/angebot/dist;
    index index.html;

    # Gzip-Komprimierung
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;

    # Statische Assets (JS, CSS, Fonts, Images) – lang cachen
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA-Fallback: alle Routen → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sicherheit: .git und versteckte Dateien blockieren
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logs
    access_log /var/log/nginx/angebot-access.log;
    error_log  /var/log/nginx/angebot-error.log;
}

