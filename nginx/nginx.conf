server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── KEIN CACHE für index.html ──────────────────────────────────
    # Browser muss bei jedem Aufruf die frische Version holen
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        add_header Surrogate-Control "no-store";
        try_files $uri /index.html;
    }

    # ── KEIN CACHE für alle .html Seiten ──────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Statische Assets: kurz cachen, aber mit ETag-Validierung ──
    location ~* \.(css|js|woff2?|ico|svg)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        etag on;
    }

    # ── API Proxy ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
